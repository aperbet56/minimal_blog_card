<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimal blog card</title>
    <!-- Importation de la favicon -->
    <link rel="shortcut icon" href="img/cactus_img.jpg" type="image/x-icon" />
    <!-- Importation des styles -->
    <link rel="stylesheet" href="normalize.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Début de la section card -->
    <section class="card">
      <div class="card__top">
        <div class="card__info">
          <img src="img/cactus_img.jpg" />
        </div>
        <div class="tag__container">
          <p class="category">Design</p>
        </div>
        <div class="text__container">
          <h2>Embracing Minimalism</h2>
          <p>
            From minimalist sculptures to minimalist paintings, this blog will
            inspire you to appreciate the beauty that lies in simplicity.
          </p>
        </div>
      </div>

      <div class="card__bottom">
        <p class="author">Annie Spratt</p>
      </div>
    </section>
    <!-- Fin de la section card -->
  </body>
</html>
